<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The 108</title>
<style>
  :root {
    --bg-color: #f4f5f7;
    --text-color: #1a1a1a;
    --secondary-text: #666;
    --btn-bg: #ffffff;
    --btn-shadow: rgba(0,0,0,0.08);
    --btn-border-selected: #1a1a1a;
    --copy-bg: #1a1a1a;
    --copy-text: #ffffff;
    --vibe-bg: #e0e0e0;
  }

  body.dark-mode {
    --bg-color: #121212;
    --text-color: #f4f5f7;
    --secondary-text: #a0a0a0;
    --btn-bg: #1e1e1e;
    --btn-shadow: rgba(0,0,0,0.5);
    --btn-border-selected: #f4f5f7;
    --copy-bg: #f4f5f7;
    --copy-text: #1a1a1a;
    --vibe-bg: #333333;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background-color: var(--bg-color);
    color: var(--text-color);
    display: flex;
    justify-content: center; /* Centers the app container horizontally */
    align-items: center; /* Centers vertically */
    min-height: 100vh;
    margin: 0;
    padding: 20px;
    box-sizing: border-box;
    transition: background-color 0.3s ease, color 0.3s ease;
  }

  /* The new container that locks the width */
  .app-container {
    width: 100%;
    max-width: 380px; /* Perfect phone width */
    position: relative; /* Anchors the moon to this box */
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  /* Dark Mode Toggle is now relative to the app-container */
  .theme-toggle {
    position: absolute;
    top: -10px;
    right: 0;
    background: none;
    border: none;
    font-size: 24px;
    cursor: pointer;
    opacity: 0.7;
    transition: opacity 0.2s ease;
  }
  
  .theme-toggle:hover { opacity: 1; }

  .brand {
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: var(--secondary-text);
    margin-bottom: 20px;
  }

  .date-display { 
    text-align: center;
    margin-bottom: 50px;
  }

  .cycle-text {
    font-size: 32px; 
    font-weight: 700;
    margin-bottom: 8px;
    color: var(--text-color);
  }

  .date-text {
    font-size: 16px;
    font-weight: 500;
    color: var(--secondary-text);
  }

  .habit-wrapper {
    padding: 10px;
    border-radius: 60px;
    transition: background-color 0.3s ease;
  }

  .button-container {
    display: flex;
    gap: 30px;
  }

  .action-btn {
    font-size: 50px;
    width: 110px;
    height: 110px;
    border: none;
    border-radius: 50%;
    background-color: var(--btn-bg);
    box-shadow: 0 10px 25px var(--btn-shadow);
    cursor: pointer;
    transition: all 0.2s ease;
    border: 4px solid transparent;
  }

  .action-btn.selected {
    border: 4px solid var(--btn-border-selected);
    transform: scale(0.92);
  }

  .vibe-row {
    display: flex;
    gap: 15px; 
    justify-content: center;
    width: 100%;
    margin-top: 40px;
    margin-bottom: 50px;
  }

  .vibe-btn {
    font-size: 24px;
    width: 60px; 
    height: 60px;
    border: none;
    border-radius: 15px;
    box-shadow: 0 4px 15px var(--btn-shadow);
    cursor: pointer;
    transition: all 0.2s ease;
    display: flex;
    align-items: center;
    justify-content: center;
    border: 3px solid transparent;
  }
  
  .vibe-btn.selected {
    border: 3px solid var(--btn-border-selected);
    transform: scale(0.9);
  }

  .vibe-1 { background-color: #ffadad; } 
  .vibe-2 { background-color: #fdffb6; } 
  .vibe-3 { background-color: #caffbf; } 

  .toggles {
    display: flex;
    gap: 20px;
    margin-bottom: 30px;
    font-size: 14px;
    color: var(--secondary-text);
  }

  .toggles label {
    display: flex;
    align-items: center;
    gap: 8px;
    cursor: pointer;
  }

/* Custom Bulletproof Checkboxes */
  .toggles input[type="checkbox"] {
    appearance: none;
    -webkit-appearance: none;
    width: 20px;
    height: 20px;
    border: 2px solid var(--secondary-text);
    border-radius: 4px;
    background-color: transparent;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: all 0.2s ease;
    margin: 0;
  }

  .toggles input[type="checkbox"]:checked {
    background-color: var(--copy-bg);
    border-color: var(--copy-bg);
  }

  /* The actual checkmark */
  .toggles input[type="checkbox"]:checked::after {
    content: "✔";
    color: var(--copy-text);
    font-size: 14px;
    font-weight: bold;
  }

  .copy-btn {
    background-color: var(--copy-bg);
    color: var(--copy-text);
    font-size: 16px;
    font-weight: 500;
    padding: 16px 45px;
    border: none;
    border-radius: 50px;
    cursor: pointer;
    box-shadow: 0 8px 20px var(--btn-shadow);
    transition: all 0.2s ease;
  }

  .copy-btn:active {
    transform: translateY(2px);
  }

  .copy-btn.success {
    background-color: #4CAF50 !important;
    color: white !important;
  }

  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    25% { transform: translateX(-8px); }
    50% { transform: translateX(8px); }
    75% { transform: translateX(-8px); }
  }

  .shake-error {
    animation: shake 0.4s ease;
    background-color: #ffebee; 
  }

</style>
</head>
<body>

  <div class="app-container">
    
    <button class="theme-toggle" id="theme-toggle" onclick="toggleTheme()">🌙</button>

    <div class="brand">The 108</div>
    
    <div class="date-display">
      <div class="cycle-text" id="header-cycle">Loading...</div>
      <div class="date-text" id="header-date"></div>
    </div>
    
    <div class="habit-wrapper" id="habit-wrapper">
      <div class="button-container">
        <button class="action-btn" id="btn-x" onclick="selectHabit('❌', 'btn-x')">❌</button>
        <button class="action-btn" id="btn-check" onclick="selectHabit('✅', 'btn-check')">✅</button>
      </div>
    </div>

    <div class="vibe-row">
      <button class="vibe-btn vibe-1" id="vibe-1" onclick="selectVibe('🔴', 'vibe-1')">🔴</button>
      <button class="vibe-btn vibe-2" id="vibe-2" onclick="selectVibe('🟡', 'vibe-2')">🟡</button>
      <button class="vibe-btn vibe-3" id="vibe-3" onclick="selectVibe('🟢', 'vibe-3')">🟢</button>
    </div>

    <div class="toggles">
      <label><input type="checkbox" id="toggle-108" onchange="saveToggles()"> Show "The 108"</label>
      <label><input type="checkbox" id="toggle-date" onchange="saveToggles()"> Show Date</label>
    </div>

    <button class="copy-btn" id="copy-btn" onclick="generateAndCopy()">Copy</button>

  </div>

  <script>
    function loadSettings() {
      if (localStorage.getItem('theme') === 'dark') {
        document.body.classList.add('dark-mode');
        document.getElementById('theme-toggle').innerText = '☀️';
      }
      
      if (localStorage.getItem('show108') === 'true') {
        document.getElementById('toggle-108').checked = true;
      }
      if (localStorage.getItem('showDate') === 'true') {
        document.getElementById('toggle-date').checked = true;
      }
    }

    loadSettings();

    function toggleTheme() {
      const isDark = document.body.classList.toggle('dark-mode');
      const toggleBtn = document.getElementById('theme-toggle');
      
      if (isDark) {
        localStorage.setItem('theme', 'dark');
        toggleBtn.innerText = '☀️';
      } else {
        localStorage.setItem('theme', 'light');
        toggleBtn.innerText = '🌙';
      }
    }

    function saveToggles() {
      localStorage.setItem('show108', document.getElementById('toggle-108').checked);
      localStorage.setItem('showDate', document.getElementById('toggle-date').checked);
    }

    let currentHabit = null;
    let currentVibe = "";
    
    function getOrdinalSuffix(i) {
      const j = i % 10, k = i % 100;
      if (j == 1 && k != 11) return i + "st";
      if (j == 2 && k != 12) return i + "nd";
      if (j == 3 && k != 13) return i + "rd";
      return i + "th";
    }

    function calculate108Time() {
      const today = new Date();
      const now = new Date(today.getFullYear(), today.getMonth(), today.getDate());
      const year = now.getFullYear();

      const cycle1 = new Date(year, 0, 1);  
      const cycle2 = new Date(year, 4, 1);  
      const cycle3 = new Date(year, 8, 1);  
      const nextCycle1 = new Date(year + 1, 0, 1); 

      let start, nextStart;

      if (now >= cycle3) {
        start = cycle3;
        nextStart = nextCycle1;
      } else if (now >= cycle2) {
        start = cycle2;
        nextStart = cycle3;
      } else {
        start = cycle1;
        nextStart = cycle2;
      }

      const diffTime = now - start;
      const dayIndex = Math.floor(diffTime / (1000 * 60 * 60 * 24)) + 1;

      let cycleDisplay = "";

      if (dayIndex <= 108) {
        cycleDisplay = `Day ${dayIndex}`;
      } else {
        const totalDaysInCycle = Math.round((nextStart - start) / (1000 * 60 * 60 * 24));
        const totalReflectionDays = totalDaysInCycle - 108;
        const currentReflectionDay = dayIndex - 108;
        cycleDisplay = `Day ${currentReflectionDay}/${totalReflectionDays}`;
      }

      const days = ['Sunday', 'Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday'];
      const months = ['January', 'February', 'March', 'April', 'May', 'June', 'July', 'August', 'September', 'October', 'November', 'December'];
      
      const dayName = days[now.getDay()];
      const monthName = months[now.getMonth()];
      const dateNum = now.getDate();
      
      document.getElementById('header-cycle').innerText = cycleDisplay;
      document.getElementById('header-date').innerText = `${dayName}, ${monthName} ${getOrdinalSuffix(dateNum)}, ${year}`;

      const shortDayInitial = dayName.charAt(0); 
      const shortDate = `${now.getMonth() + 1}/${dateNum}`; 

      return {
        displayString: cycleDisplay,
        shortDateString: `${shortDayInitial}, ${shortDate}` 
      };
    }

    const timelineData = calculate108Time();

    function selectHabit(habit, elementId) {
      currentHabit = habit;
      document.getElementById('btn-check').classList.remove('selected');
      document.getElementById('btn-x').classList.remove('selected');
      document.getElementById(elementId).classList.add('selected');
      
      document.getElementById('habit-wrapper').classList.remove('shake-error');
    }

    function selectVibe(vibe, elementId) {
      if (currentVibe === vibe) {
        currentVibe = "";
        document.getElementById(elementId).classList.remove('selected');
        return;
      }
      currentVibe = vibe;
      const vibeButtons = document.querySelectorAll('.vibe-btn');
      vibeButtons.forEach(btn => btn.classList.remove('selected'));
      document.getElementById(elementId).classList.add('selected');
    }

function generateAndCopy() {
      if (!currentHabit) {
        const wrapper = document.getElementById('habit-wrapper');
        wrapper.classList.remove('shake-error'); 
        void wrapper.offsetWidth; 
        wrapper.classList.add('shake-error');
        return; 
      }

      const show108 = document.getElementById('toggle-108').checked;
      const showDate = document.getElementById('toggle-date').checked;

      let headerParts = [];
      if (show108) headerParts.push("The 108:");
      
      // Build the time string with the Day first, then the Date
      let timeString = timelineData.displayString;
      if (showDate) {
        timeString += `, ${timelineData.shortDateString}`;
      }
      headerParts.push(timeString);
      
      const headerLine = headerParts.join(" ");

      let dataLine = currentHabit;
      if (currentVibe !== "") {
        dataLine += ` ${currentVibe}`;
      }

      const finalClipboardText = `${headerLine}\n${dataLine}`;

      navigator.clipboard.writeText(finalClipboardText).then(() => {
        let copyBtn = document.getElementById('copy-btn');
        copyBtn.innerText = "Copied!";
        copyBtn.classList.add('success');
        
        setTimeout(() => {
          copyBtn.innerText = "Copy";
          copyBtn.classList.remove('success');
        }, 2000);
      });
    }
  </script>
</body>
</html>
